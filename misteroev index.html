<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mister ÖV – Beratung, Planung & Fahrdienst</title>
  <meta name="description" content="Mister ÖV: ÖV-Beratung, Betriebsplanung, Ersatzverkehr und Fahrdienst (Bus/Car/Trolleybus) in der ganzen Schweiz." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22%23D40000%22/><rect x=%2235%22 y=%2210%22 width=%2230%22 height=%2280%22 fill=%22white%22/><rect x=%2210%22 y=%2235%22 width=%2280%22 height=%2230%22 fill=%22white%22/></svg>">
  <style>
    :root{
      --red:#D40000;          /* Schweizer Rot */
      --red-dark:#a90000;
      --bg:#ffffff;           /* Weiss */
      --text:#222222;         /* Dunkles Grau für Lesbarkeit */
      --muted:#6b6b6b;
      --light:#f5f5f7;
      --card:#fcfcfc;
      --shadow: 0 6px 24px rgba(0,0,0,.08);
      --radius:14px;
      --max:1100px;
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font:16px/1.6 system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji"}
    a{color:var(--red);text-decoration:none}
    a:hover{color:var(--red-dark)}

    /* Header / Hero */
    header{
      position:relative;
      background:linear-gradient(180deg, var(--bg) 0%, #fff 40%, var(--light) 100%);
      isolation:isolate;
    }
    .nav{
      max-width:var(--max);
      margin:0 auto;
      padding:16px 20px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }
    .brand{
      display:flex;align-items:center;gap:10px;font-weight:800;letter-spacing:.2px;
    }
    .logo{
      width:34px;height:34px;border-radius:8px;background:var(--red);
      display:grid;place-items:center;color:#fff;font-weight:900;
      box-shadow:var(--shadow)
    }
    .nav a.btn{
      padding:10px 14px;border-radius:10px;border:2px solid var(--red);font-weight:700
    }
    .nav a.btn.primary{
      background:var(--red);color:#fff;border-color:var(--red)
    }
    .nav a.btn.primary:hover{background:var(--red-dark);border-color:var(--red-dark)}

    .hero{
      max-width:var(--max);
      margin:0 auto;
      padding: 52px 20px 34px;
      display:grid;grid-template-columns:1.15fr .85fr;gap:28px;
      align-items:center;
    }
    @media (max-width: 900px){
      .hero{grid-template-columns:1fr;padding-top:30px}
    }
    .hero h1{font-size:clamp(28px, 4.2vw, 46px);line-height:1.12;margin:0 0 10px}
    .hero p.lead{font-size:clamp(16px,2.2vw,20px);color:var(--muted);margin:0 0 22px}
    .cta{
      display:flex;gap:12px;flex-wrap:wrap
    }
    .btn{
      display:inline-flex;align-items:center;gap:8px;
      background:var(--red);color:#fff;border:none;
      padding:12px 16px;border-radius:12px;font-weight:800;box-shadow:var(--shadow)
    }
    .btn:hover{background:var(--red-dark)}
    .btn.outline{background:#fff;color:var(--red);border:2px solid var(--red)}
    .btn.outline:hover{background:#fff0f0}

    .hero-card{
      background:var(--card);border:1px solid #ececec;border-radius:var(--radius);box-shadow:var(--shadow);
      padding:18px
    }
    .badges{
      display:flex;gap:8px;flex-wrap:wrap;margin:10px 0 0
    }
    .badge{
      background:#fff;border:1px solid #eee;border-left:4px solid var(--red);
      color:#444;padding:8px 10px;border-radius:10px;font-size:13px
    }

    /* Sections */
    section{padding:56px 20px}
    .container{max-width:var(--max);margin:0 auto}
    h2{
      font-size:clamp(22px,3vw,28px);
      border-left:7px solid var(--red);padding-left:12px;margin:0 0 18px
    }
    .grid{
      display:grid;gap:18px;grid-template-columns:repeat(3,1fr)
    }
    @media (max-width: 900px){.grid{grid-template-columns:1fr}}
    .card{
      background:var(--card);border:1px solid #eee;border-radius:var(--radius);
      padding:18px;box-shadow:var(--shadow)
    }
    .card h3{margin:4px 0 8px}
    .card p{margin:0;color:#444}

    /* Contact */
    .contact{
      background:linear-gradient(180deg, var(--light), #fff)
    }
    form{
      display:grid;gap:12px;max-width:700px
    }
    input, textarea{
      width:100%;padding:12px 14px;border:1px solid #ddd;border-radius:10px;
      font:inherit;background:#fff
    }
    textarea{min-height:120px;resize:vertical}
    .small{font-size:13px;color:var(--muted)}
    .kicker{font-weight:800;color:var(--red);text-transform:uppercase;letter-spacing:.06em;font-size:12px;margin-bottom:6px}

    /* Footer */
    footer{padding:26px 20px;border-top:1px solid #eee;color:#666}
    .foot{max-width:var(--max);margin:0 auto;display:flex;flex-wrap:wrap;gap:10px;justify-content:space-between;align-items:center}
  </style>
</head>
<body>

  <!-- NAV + HERO -->
  <header>
    <nav class="nav" aria-label="Hauptnavigation">
      <div class="brand">
        <div class="logo" aria-hidden="true">ÖV</div>
        <span>Mister&nbsp;ÖV</span>
      </div>
      <div class="links" role="navigation">
        <a class="btn outline" href="#leistungen">Leistungen</a>
        <a class="btn outline" href="#referenzen">Referenzen</a>
        <a class="btn primary" href="#kontakt">Kontakt</a>
      </div>
    </nav>

    <div class="hero">
      <div>
